name: Sejong Notice Checker

on:
  schedule:
    - cron: '0 22 * * *'  # 매일 오전 7시 (KST = UTC+9)
  workflow_dispatch:
    inputs:
      test:
        description: 'Slack 연결 테스트만 실행'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check notices
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python checker.py ${{ inputs.test && '--test' || '' }}

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "chore: update notice state [skip ci]"
          git push
